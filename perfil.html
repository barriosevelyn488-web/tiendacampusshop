<!DOCTYPE html>

        <nav class="grid-opciones">

            <a href="solo ejemplo" class="tarjeta-perfil">
                <div class="icono-contenedor verde">

                </div>

                </div>

            </a>

            <a href="index.html" class="tarjeta-perfil">
                <div class="icono-contenedor rojo">
                    <span class="emoji-perfil">➔</span>
                </div>
                <h3 class="texto-rojo">Cerrar Sesión</h3>
            </a>
        </nav>
    </main>

    <nav class="barra-inferior">
        <a href="index.html" class="icono-nav activo">
            <i>🏠</i>

        </a> 
        <a href="favoritos.html" class="icono-nav">

        </a>
        <a href="historial.html" class="icono-nav">
            <i>📦</i>
            <span>Pedidos</span>
        </a> 
        <a href="carrito.html" class="icono-nav">
            <i>🛒</i>
            <span>Carrito</span>
        </a>
