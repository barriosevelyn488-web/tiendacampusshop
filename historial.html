<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliShop - Historial de Pedidos</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body class="cuerpo-gris">

    <header class="barra_superior">
        <div class="header_top">
            <a href="perfil.html" class="icono_accion">←</a>
            <h1 class="titulo_centro">Historial de Pedidos</h1>
            <div style="width:24px;"></div> 
        </div>
    </header>

    <main class="contenedor-historial">
        <div class="tarjeta-orden">
            <div class="encabezado-orden">
                <span class="id-orden">Orden #12345</span>
                <span class="precio-orden">$125.50</span>
            </div>
            <p class="fecha-orden">15 Oct, 2023</p>
            <div class="pie-orden">
                <span class="estado tag-entregado">● Entregado</span>
                <a href="#" class="btn-detalle">Ver detalle ></a>
            </div>
        </div>

        <div class="tarjeta-orden">
            <div class="encabezado-orden">
                <span class="id-orden">Orden #12344</span>
                <span class="precio-orden">$89.99</span>
            </div>
            <p class="fecha-orden">12 Oct, 2023</p>
            <div class="pie-orden">
                <span class="estado tag-camino">● En camino</span>
                <a href="#" class="btn-detalle">Ver detalle ></a>
            </div>
        </div>

        <div class="tarjeta-orden">
            <div class="encabezado-orden">
                <span class="id-orden">Orden #12343</span>
                <span class="precio-orden">$210.00</span>
            </div>
            <p class="fecha-orden">05 Oct, 2023</p>
            <div class="pie-orden">
                <span class="estado tag-cancelado">● Cancelado</span>
                <a href="#" class="btn-detalle">Ver detalle ></a>
            </div>
        </div>
    </main>

    <nav class="barra-inferior">
        <a href="index.html" class="icono-nav activo">
            <i>🏠</i>
            <span>Inicio</span>
        </a> 
        <a href="favoritos.html" class="icono-nav">
            <i>❤️</i>
            <span>Favoritos</span>
        </a>
        <a href="historial.html" class="icono-nav">
            <i>📦</i>
            <span>Pedidos</span>
        </a> 
        <a href="carrito.html" class="icono-nav">
            <i>🛒</i>
            <span>Carrito</span>
        </a> 
        <a href="perfil.html" class="icono-nav">
            <i>👤</i>
            <span>Perfil</span>
        </a>
    </nav>
</body>
</html>
