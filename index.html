<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> EliShop inicio</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="barra_superior">
        <input type="checkbox" id="checkMenu" class="oculto">
        <label for="checkMenu" class="boton-hamburguesa">☰</label>
    
        <div class="logo">
            <h1>Eli <span>Shop</span></h1>
            <img src="img/Elishop.png" alt="logo" class="img-logo">
        </div>
    
        <a href="vacio.html" class="carrito">🛒</a>
    
        <nav class="menu-desplegable">
            <ul class="lista_navegacion">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Productos</a></li>
                <li><a href="perfil.html">Mi Perfil</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenedor1">
        <section class="seccion-buscar">
            <input type="text" placeholder="que prenda buscas?" class="entrada-busqueda">
        </section>

        <section class="categorias-cortas">
            <button class="filtro">Abrigos</button>
            <button class="filtro">Camisetas</button>
            <button class="filtro">Pantalones</button>
        </section>
        
        <section class="novedades">
            <h2 class="titulo-seccion">Novedades</h2>
            
            <div class="bloque-productos">
                <article class="tarjeta">
                    <div class="foto-producto">
                        <img src="https://via.placeholder.com/150" alt="Chaqueta">
                        <button class="corazon">❤</button>
                    </div>
                    <div class="detalles">
                        <h3>Chaqueta Verde</h3>
                        <p class="precio">Q450</p>
                        <a href="producto.html" class="enlace-ver">Ver más</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <div class="foto-producto">
                        <img src="https://via.placeholder.com/150" alt="Camiseta">
                        <button class="corazon">❤</button>
                    </div>
                    <div class="detalles">
                        <h3>Camiseta Blanca</h3>
                        <p class="precio">Q230</p>
                        <a href="producto.html" class="enlace-ver">Ver más</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <div class="foto-producto">
                        <img src="https://via.placeholder.com/150" alt="abrigo"> 
                        <button class="corazon">❤</button>
                    </div>
                    <div class="detalles">
                        <h3>Abrigo de piel</h3>
                        <p class="precio">Q1200</p>
                        <a href="producto.html" class="enlace-ver">ver mas</a>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <nav class="barra-inferior">
        <a href="index.html" class="icono-nav activo">
            <i>🏠</i>
            <span>Inicio</span>
        </a> 
        
        <a href="favoritos.html" class="icono-nav">
            <i>❤️</i>
            <span>Favoritos</span>
        </a>
    
        <a href="historial.html" class="icono-nav">
            <i>📦</i>
            <span>Pedidos</span>
        </a> 
        
        <a href="vacio.html" class="icono-nav">
            <i>🛒</i>
            <span>Carrito</span>
        </a> 
        
        <a href="perfil.html" class="icono-nav">
            <i>👤</i>
            <span>Perfil</span>
        </a>
    </nav>
</body>
</html>
